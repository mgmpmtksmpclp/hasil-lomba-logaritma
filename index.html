<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Data Nilai Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .animate-fade-up {
            animation: fadeUp 0.5s ease-out forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto w-full">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 tracking-tight">HASIL LOMBA LOGARITMA</h1>
            <h1 class="text-3xl md:text-3xl font-bold text-slate-800 tracking-tight">BABAK 1</h1>
            <p class="text-slate-500 mt-2 text-lg">Cari NPSN untuk menampilkan semua tim dari sekolah Anda</p>
        </div>

        <!-- Search Card -->
        <div class="glass-morphism p-6 rounded-2xl shadow-xl mb-10 sticky top-4 z-10 border-blue-100">
            <div class="flex flex-col md:flex-row gap-3">
                <input 
                    type="text" 
                    id="npsnInput" 
                    placeholder="Masukkan 8 Digit NPSN Sekolah..." 
                    class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-lg"
                >
                <button 
                    onclick="searchData()" 
                    id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-xl font-semibold transition-all flex items-center justify-center shadow-lg shadow-blue-200"
                >
                    <span id="btnText">Cari Data</span>
                    <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin ml-2"></div>
                </button>
            </div>
            <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden font-medium"></p>
        </div>

        <!-- School Info Header (Hidden by default) -->
        <div id="schoolHeader" class="hidden mb-6 px-2">
            <h2 id="displaySchoolName" class="text-2xl font-bold text-slate-800">Nama Sekolah</h2>
            <p id="displayNpsn" class="text-slate-500">NPSN: 12345678</p>
            <div class="h-1 w-20 bg-blue-500 mt-2 rounded-full"></div>
        </div>

        <!-- Results Container -->
        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Team Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20 text-slate-400">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <p>Belum ada data yang dicari</p>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6EvOxmal5IBY2OpmU591kgRKa0x76osoH2QrDK02FWiiUdvy-80BFPcKbmfIvxrJqqAZYNI22_hzG/pub?gid=687792661&single=true&output=csv';

        async function searchData() {
            const input = document.getElementById('npsnInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultsGrid = document.getElementById('resultsGrid');
            const schoolHeader = document.getElementById('schoolHeader');
            const emptyState = document.getElementById('emptyState');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            if (!input) {
                showError("Silakan masukkan NPSN terlebih dahulu.");
                return;
            }

            // Loading State
            errorMsg.classList.add('hidden');
            loader.classList.remove('hidden');
            btnText.innerText = "Mencari...";
            resultsGrid.innerHTML = '';
            schoolHeader.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: false,
                    complete: function(results) {
                        const rows = results.data;
                        // Filter SEMUA baris yang NPSN-nya cocok (Kolom C / Index 2)
                        const allTeams = rows.filter(row => row[2] && row[2].trim() === input);

                        if (allTeams.length > 0) {
                            // Set School Info dari tim pertama
                            document.getElementById('displaySchoolName').innerText = allTeams[0][1];
                            document.getElementById('displayNpsn').innerText = `NPSN: ${allTeams[0][2]}`;
                            schoolHeader.classList.remove('hidden');

                            // Render setiap tim
                            allTeams.forEach((team, index) => {
                                renderTeamCard(team, index);
                            });
                        } else {
                            showError("Data tidak ditemukan untuk NPSN tersebut.");
                            emptyState.classList.remove('hidden');
                        }
                        
                        loader.classList.add('hidden');
                        btnText.innerText = "Cari Data";
                    },
                    error: function() {
                        showError("Gagal mengambil data. Periksa koneksi internet Anda.");
                        loader.classList.add('hidden');
                        btnText.innerText = "Cari Data";
                    }
                });
            } catch (e) {
                showError("Terjadi kesalahan teknis.");
                loader.classList.add('hidden');
                btnText.innerText = "Cari Data";
            }
        }

        function renderTeamCard(data, index) {
            const container = document.getElementById('resultsGrid');
            const card = document.createElement('div');
            card.className = "glass-morphism rounded-2xl shadow-lg overflow-hidden border border-slate-100 animate-fade-up";
            card.style.animationDelay = `${index * 100}ms`;

            // Mapping: A=0 (Rank), B=1 (Nama), C=2 (NPSN), E=4 (Nilai), F=5 (Ang1), G=6 (Ang2), H=7 (Ang3)
            const html = `
                <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Tim #${index + 1}</span>
                    <span class="bg-blue-500 text-white px-3 py-1 rounded-full text-sm font-bold">Rank ${data[0] || '-'}</span>
                </div>
                <div class="p-6">
                    <div class="mb-6">
                        <p class="text-slate-400 text-xs font-bold uppercase mb-1">Total Skor</p>
                        <p class="text-4xl font-black text-blue-600">${data[4] || '0'}</p>
                    </div>
                    
                    <div class="space-y-3">
                        <p class="text-slate-800 font-bold text-sm flex items-center">
                            <svg class="w-4 h-4 mr-2 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path></svg>
                            Anggota Tim:
                        </p>
                        <div class="grid gap-2">
                            ${data[5] ? `<div class="bg-slate-50 p-2 rounded-lg text-sm text-slate-600 border border-slate-100 flex items-center"><span class="w-2 h-2 bg-blue-400 rounded-full mr-2"></span>${data[5]}</div>` : ''}
                            ${data[6] ? `<div class="bg-slate-50 p-2 rounded-lg text-sm text-slate-600 border border-slate-100 flex items-center"><span class="w-2 h-2 bg-blue-400 rounded-full mr-2"></span>${data[6]}</div>` : ''}
                            ${data[7] ? `<div class="bg-slate-50 p-2 rounded-lg text-sm text-slate-600 border border-slate-100 flex items-center"><span class="w-2 h-2 bg-blue-400 rounded-full mr-2"></span>${data[7]}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            card.innerHTML = html;
            container.appendChild(card);
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }

        document.getElementById("npsnInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                searchData();
            }
        });
    </script>
</body>
</html>
